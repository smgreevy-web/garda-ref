<!DOCTYPE html>
<html lang="en-IE">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a1930">
<meta name="description" content="Garda Investigation Reference — searchable offline reference. No case data.">
<title>Garda Reference</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Garda Ref">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <div class="brand" id="brandBtn">
      <span class="harp">⚖</span>
      <div><b>Garda Reference</b><small>Vols 1–12 · Manual · Statements — offline</small></div>
    </div>
    <div id="loadState" class="loadstate" title="Content load status"></div>
  </header>

  <main id="view" tabindex="-1"></main>

  <div id="reader" class="reader hidden" aria-hidden="true">
    <div class="rd-top">
      <button id="rdBack" class="iconbtn" aria-label="Back">‹</button>
      <div class="rd-meta">
        <div id="rdTitle" class="rd-title"></div>
        <div id="rdPage" class="rd-page"></div>
      </div>
      <button id="rdStar" class="iconbtn" aria-label="Save section">☆</button>
    </div>
    <div id="rdFlag" class="rd-flag hidden"></div>
    <article id="rdBody" class="rd-body"></article>
    <div class="rd-nav">
      <button id="rdPrev" class="navbtn">‹ Prev</button>
      <button id="rdJump" class="navbtn mid">Go to page…</button>
      <button id="rdNext" class="navbtn">Next ›</button>
    </div>
  </div>

  <nav id="tabbar" role="tablist">
    <button data-tab="search" class="tab active" role="tab"><span class="ti">⌕</span>Search</button>
    <button data-tab="browse" class="tab" role="tab"><span class="ti">☰</span>Browse</button>
    <button data-tab="index" class="tab" role="tab"><span class="ti">A–Z</span>Indexes</button>
    <button data-tab="tools" class="tab" role="tab"><span class="ti">✓</span>Tools</button>
    <button data-tab="saved" class="tab" role="tab"><span class="ti">★</span>Saved</button>
  </nav>

  <footer id="banner">Working reference — not legal advice — verify current wording · <span id="verinfo"></span></footer>
</div>
<script src="app.js"></script>
</body>
</html>
